name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        go-version: ['1.23']
    env:
      GOTOOLCHAIN: local

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: ${{ matrix.go-version }}
        cache: true 

    - name: Cache dependencies
      uses: actions/cache@v3
      with:
        path: |
          ~/.cache/go-build
          ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ matrix.go-version }}-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-${{ matrix.go-version }}-

    - name: Download dependencies
      run: go mod download

    - name: Verify dependencies
      run: go mod verify

    - name: Build
      run: go build -v ./...

    - name: Run tests
      run: go test -v -race -timeout=5m -coverprofile=coverage.out ./pkg/...

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.out
        flags: unittests
        name: codecov-umbrella

    - name: Check test coverage
      run: |
        go tool cover -func=coverage.out
        echo "Coverage report:"
        go tool cover -func=coverage.out | tail -1

    - name: Enforce minimum coverage
      run: |
        # Floor, not a target: set a few points below the coverage measured
        # when this check was added (~45.5% total) so genuine regressions
        # fail the build without making the bar unrealistically high overnight.
        # Ratchet this up over time as coverage improves — never lower it to
        # make a failing PR pass.
        MIN_COVERAGE=40
        COVERAGE=$(go tool cover -func=coverage.out | tail -1 | grep -oE '[0-9]+\.[0-9]+' | tail -1)
        echo "Total coverage: ${COVERAGE}% (minimum: ${MIN_COVERAGE}%)"
        if (( $(echo "$COVERAGE < $MIN_COVERAGE" | bc -l) )); then
          echo "::error::Coverage ${COVERAGE}% is below the ${MIN_COVERAGE}% floor"
          exit 1
        fi

  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.22'  # Usar Go 1.22 para evitar problemas con 1.23

    - name: Cache Go modules
      uses: actions/cache@v3
      with:
        path: |
          ~/.cache/go-build
          ~/go/pkg/mod
        key: ${{ runner.os }}-go-1.22-${{ hashFiles('**/go.sum') }}

    - name: Download dependencies
      run: go mod download

    - name: Basic Go checks
      run: |
        # Verificar formato
        if [ "$(gofmt -s -l . | wc -l)" -gt 0 ]; then
          echo "Code is not properly formatted. Run 'gofmt -w .'"
          gofmt -s -l .
          exit 1
        fi
        
        # Verificar que compila
        go build -v ./...
        
        # Verificar imports
        if command -v goimports &> /dev/null; then
          goimports -l .
        fi

  integration:
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 10

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.23'

    - name: Build R2Lang
      run: go build -o r2lang main.go

    - name: Run gold_test.r2 (comprehensive language regression script)
      run: ./r2lang gold_test.r2

    - name: Sweep all example scripts
      # scripts/sweep_examples.sh actually fails the job on any regression —
      # a script not listed in scripts/known_flaky_examples.txt that fails
      # or times out. Known-flaky scripts (server demos with no client,
      # network-dependent examples, r2test-DSL-only scripts, etc.) are
      # explicitly allowlisted there with a documented reason each; see that
      # file before adding new entries.
      run: ./scripts/sweep_examples.sh ./r2lang 20

  security:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.22'

    - name: Download dependencies
      run: go mod download

    - name: Basic security checks
      run: |
        echo "Running basic security checks..."
        
        # Verificar que no hay credenciales hardcodeadas
        if grep -r -i "password\|secret\|key\|token" --include="*.go" . | grep -v "test" | head -5; then
          echo "Warning: Potential hardcoded credentials found"
        fi
        
        # Verificar imports seguros
        echo "Checking for unsafe imports..."
        if grep -r "unsafe" --include="*.go" . | head -5; then
          echo "Warning: Unsafe package usage found"
        fi
        
        echo "Basic security check completed"

    - name: Run gosec (if available)
      run: |
        # Intentar instalar gosec
        if go install github.com/securecodewarrior/gosec/v2/cmd/gosec@latest; then
          echo "gosec installed successfully"
          if command -v gosec &> /dev/null; then
            gosec -fmt json -out gosec-results.json ./... || echo "gosec completed with findings"
            echo "Security scan completed"
          fi
        else
          echo "Could not install gosec, skipping detailed security scan"
        fi
      continue-on-error: true